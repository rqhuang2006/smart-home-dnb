<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>授权人员录入</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>智能家居人脸门禁测试</h1>
    <nav>
      <a href="/face/register">人员录入</a>
      <a href="/face/verify">人脸验证</a>
      <a href="/face/logs">识别记录</a>
      <a href="/docs">API Docs</a>
    </nav>
  </header>
  <main>
    <section class="panel">
      <h2>授权人员录入</h2>
      <form id="register-form">
        <div class="grid">
          <div>
            <label for="name">姓名</label>
            <input id="name" name="name" type="text" required placeholder="张三">
          </div>
          <div>
            <label for="role">身份</label>
            <input id="role" name="role" type="text" value="student">
          </div>
          <div>
            <label for="authorized">是否授权开门</label>
            <select id="authorized" name="authorized" required>
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>
        </div>
        <label for="face_image">人脸图片</label>
        <input id="face_image" name="face_image" type="file" accept="image/*" required>
        <button type="submit">提交录入</button>
      </form>
    </section>

    <section class="panel">
      <h2>录入结果</h2>
      <pre id="register-result" class="result">等待提交...</pre>
    </section>

    <section class="panel">
      <h2>人员列表</h2>
      <button class="secondary" onclick="loadPersons()">刷新列表</button>
      <table>
        <thead>
          <tr>
            <th>person_id</th>
            <th>姓名</th>
            <th>身份</th>
            <th>authorized</th>
            <th>created_at</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="persons-body"></tbody>
      </table>
    </section>
  </main>
  <script src="/static/js/main.js"></script>
  <script>
    document.getElementById("register-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = event.target.querySelector("button");
      button.disabled = true;
      try {
        const data = await postForm("/api/v1/persons", event.target);
        showJson("register-result", data);
        await loadPersons();
      } catch (error) {
        showJson("register-result", { code: 5000, message: error.message, data: null });
      } finally {
        button.disabled = false;
      }
    });
    loadPersons();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>识别记录</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>智能家居人脸门禁测试</h1>
    <nav>
      <a href="/face/register">人员录入</a>
      <a href="/face/verify">人脸验证</a>
      <a href="/face/logs">识别记录</a>
      <a href="/docs">API Docs</a>
    </nav>
  </header>
  <main>
    <section class="panel">
      <h2>最近识别记录</h2>
      <label for="limit">显示条数</label>
      <input id="limit" type="number" min="1" max="500" value="50">
      <button class="secondary" onclick="loadLogs()">刷新日志</button>
    </section>
    <section class="panel">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>created_at</th>
            <th>person_id</th>
            <th>姓名</th>
            <th>matched</th>
            <th>confidence</th>
            <th>door_allowed</th>
            <th>reason</th>
          </tr>
        </thead>
        <tbody id="logs-body"></tbody>
      </table>
    </section>
  </main>
  <script src="/static/js/main.js"></script>
  <script>
    loadLogs();
  </script>
</body>
</html>
